version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: gpa-db
    environment:
      - POSTGRES_DB=AcademicGPA
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=YourSecurePassword123!
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: gpa-ai-service
    ports:
      - "8000:8000"
    environment:
      - AI_SERVICE_API_KEY=SuperSecretAiAdvisorApiKey123!
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gpa-backend
    ports:
      - "5000:10000"
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=AcademicGPA;Username=postgres;Password=YourSecurePassword123!
      - AiService__BaseUrl=http://ai-service:8000
      - AiService__ApiKey=SuperSecretAiAdvisorApiKey123!
      - ApplyMigrationsOnStartup=true
      - Jwt__Secret=SuperSecretKeyEnsure32CharactersLongAndSecureForSigning!
      - Jwt__Issuer=gpa-api-server
      - Jwt__Audience=gpa-client-app
      - PORT=10000
    depends_on:
      db:
        condition: service_healthy
      ai-service:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gpa-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
