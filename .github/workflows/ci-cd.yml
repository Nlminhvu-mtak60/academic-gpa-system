name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore Dependencies
        run: dotnet restore backend/AcademicGPA.slnx

      - name: Build Solution
        run: dotnet build backend/AcademicGPA.slnx --no-restore -c Release

      - name: Run Unit & Integration Tests
        run: dotnet test backend/AcademicGPA.slnx --no-build --verbosity normal

  frontend-lint-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-dotnet@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run Linter
        working-directory: ./frontend
        run: npm run lint
        continue-on-error: true # Allow warning-based audits

      - name: Run Build
        working-directory: ./frontend
        run: npm run build

  docker-build-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate Docker Compose Build
        run: docker compose build
